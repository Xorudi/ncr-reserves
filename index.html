<!doctype html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <!-- Locked viewport: behave like a native mobile app, NOT a zoomable
         web page. maximum-scale=1 + user-scalable=no disables pinch zoom
         on iOS Safari; without this, pinch zoom changes the visual viewport
         while the layout viewport stays put, fixing position:fixed elements
         (incl. the bottom nav) to the wrong rectangle. viewport-fit=cover
         opts in to drawing under the iPhone notch + home indicator so we
         can use env(safe-area-inset-*) to inset just our chrome. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />

    <!-- PWA / iOS — when added to Home Screen the app runs in true
         standalone mode (no browser chrome, no bottom toolbar). The
         cream theme_color matches the body background so the status
         bar area blends with the canvas. status-bar-style=default keeps
         the status bar text dark on our light surface; black-translucent
         would have eaten our top padding. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="NCR Reserves" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#F5EFE4" />
    <meta name="application-name" content="NCR Reserves" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />

    <title>NCR RESERVES</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
